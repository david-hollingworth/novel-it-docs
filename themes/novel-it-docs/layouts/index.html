{{ define "main" }}
<article>
  <header class="mb-8 pb-6 border-b border-slate-200">
    <h1 class="text-3xl font-bold text-slate-900">{{ .Title }}</h1>
  </header>

  <div class="prose max-w-none leading-relaxed mb-12">
    {{ .Content }}
  </div>

  <!-- Section cards -->
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
    {{ range .Site.Sections }}
    <a href="{{ .Permalink }}"
       class="block border border-slate-200 rounded p-5 hover:border-blue-300 hover:bg-white transition-colors">
      <h2 class="text-lg font-bold text-slate-800 hover:text-blue-600 mb-1">{{ .Title }}</h2>
      {{ with .Description }}
      <p class="text-sm text-slate-500">{{ . }}</p>
      {{ end }}
      <p class="text-xs text-slate-400 mt-2">{{ len .Pages }} {{ if eq (len .Pages) 1 }}page{{ else }}pages{{ end }}</p>
    </a>
    {{ end }}
  </div>
</article>
{{ end }}
