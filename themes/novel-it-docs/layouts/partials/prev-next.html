<!-- Previous / Next page navigation -->
<div class="flex items-center justify-between mt-12 pt-6 border-t border-slate-200 text-sm">
  <div>
    {{ with .NextInSection }}
    <a href="{{ .Permalink }}" class="flex items-center gap-2 text-slate-600 hover:text-blue-600 transition-colors">
      <span>&larr;</span>
      <span>{{ .Title }}</span>
    </a>
    {{ end }}
  </div>
  <div>
    {{ with .PrevInSection }}
    <a href="{{ .Permalink }}" class="flex items-center gap-2 text-slate-600 hover:text-blue-600 transition-colors">
      <span>{{ .Title }}</span>
      <span>&rarr;</span>
    </a>
    {{ end }}
  </div>
</div>
