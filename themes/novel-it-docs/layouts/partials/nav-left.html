<!-- Left navigation sidebar -->
<nav class="text-sm">

  <!-- Home link -->
  <div class="mb-4">
    <a href="{{ .Site.BaseURL }}"
       class="font-bold text-slate-700 hover:text-blue-600 transition-colors {{ if .IsHome }}text-blue-600{{ end }}">
      Home
    </a>
  </div>

  <!-- Top-level sections -->
  {{ range .Site.Sections }}
  <div class="mb-6">

    <!-- Section heading links to section index -->
    <a href="{{ .Permalink }}"
       class="block font-bold text-slate-700 uppercase tracking-wider text-xs mb-2 hover:text-blue-600 transition-colors {{ if eq $.Section .Section }}text-blue-600{{ end }}">
      {{ .Title }}
    </a>

    <!-- Section pages -->
    <ul class="space-y-1 border-l border-slate-200 pl-3">
      {{ range .Pages.ByTitle }}
      <li>
        <a href="{{ .Permalink }}"
           class="block py-0.5 text-slate-600 hover:text-blue-600 transition-colors leading-snug
                  {{ if eq $.Page.Permalink .Permalink }}font-semibold text-blue-600 border-l-2 border-blue-600 -ml-3 pl-2.5{{ end }}">
          {{ .Title }}
        </a>
      </li>
      {{ end }}
    </ul>

  </div>
  {{ end }}

</nav>
